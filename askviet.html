<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>AskViet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --border:#2a2a3a;
  --tr:#7c3aed;
  --tr2:#a78bfa;
  --vi:#b91c6e;
  --vi2:#f472b6;
  --text:#f0f0f5;
  --muted:#666;
  --radius:18px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* PASSWORD */
#pwscreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:32px}
.pw-logo{font-size:38px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--tr2),var(--vi2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pw-box{display:flex;gap:8px;width:100%;max-width:320px}
.pw-input{flex:1;padding:12px 14px;border-radius:12px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-size:16px;outline:none;text-align:center;letter-spacing:4px}
.pw-input:focus{border-color:var(--tr)}
.pw-btn{padding:12px 20px;border-radius:12px;background:var(--tr);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.pw-err{color:#ef4444;font-size:13px;display:none}

/* SETUP */
#setup{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;gap:18px;overflow-y:auto}
.logo{font-size:36px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--tr2),var(--vi2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{color:var(--muted);font-size:13px;margin-top:-14px}
.setup-card{width:100%;max-width:340px;background:var(--surface);border-radius:16px;padding:16px;border:1px solid var(--border);display:flex;flex-direction:column;gap:12px}
.setup-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.setup-input{width:100%;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:14px;outline:none}
.setup-input:focus{border-color:var(--tr)}
.paste-row{display:flex;gap:6px}
.paste-row .setup-input{flex:1}
.paste-btn{padding:10px 12px;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.paste-btn:active{background:var(--border)}
.model-select{width:100%;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:14px;outline:none;cursor:pointer}
.role-cards{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}
.role-card{padding:16px;border-radius:var(--radius);cursor:pointer;border:2px solid var(--border);background:var(--surface);transition:all .15s ease;user-select:none}
.role-card:active{transform:scale(.97)}
.role-card.tr-card{border-color:var(--tr)}
.role-card.vi-card{border-color:var(--vi)}
.role-flag{font-size:28px;margin-bottom:6px}
.role-name{font-weight:800;font-size:16px;margin-bottom:3px}
.role-desc{font-size:12px;color:var(--muted)}

/* CHAT */
#chat{display:none;flex-direction:column;height:100%}
.chat-header{padding:env(safe-area-inset-top) 16px 12px;padding-top:max(env(safe-area-inset-top),14px);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-title{font-weight:900;font-size:16px}
.chat-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.conn-dot.off{background:#ef4444}
.back-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px}

.messages{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}

.msg{display:flex;flex-direction:column;max-width:82%}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}

/* Okunacak dil — büyük ve belirgin */
.msg-original{padding:10px 14px;border-radius:var(--radius);font-size:16px;font-weight:600;line-height:1.4;word-break:break-word}
.msg.mine .msg-original{background:var(--tr);color:#fff;border-bottom-right-radius:4px}
.msg.theirs .msg-original{background:var(--vi);color:#fff;border-bottom-left-radius:4px}

/* Çeviri — küçük ve soluk */
.msg-translation{font-size:12px;color:var(--muted);padding:3px 14px 0;font-style:italic;line-height:1.4}

.msg-time{font-size:10px;color:var(--muted);padding:2px 14px 4px}

.typing-indicator{display:none;align-self:flex-start;background:var(--surface2);padding:10px 14px;border-radius:var(--radius);border-bottom-left-radius:4px}
.typing-indicator.show{display:flex;gap:4px;align-items:center}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typingBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.input-bar{padding:10px 10px;padding-bottom:max(env(safe-area-inset-bottom),10px);background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.msg-input{flex:1;padding:10px 14px;border-radius:22px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:15px;outline:none;resize:none;max-height:120px;line-height:1.4;font-family:inherit}
.msg-input:focus{border-color:var(--tr)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--tr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;transition:transform .1s ease}
.send-btn:active{transform:scale(.9)}
.send-btn:disabled{background:var(--border);cursor:not-allowed}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);padding:32px;text-align:center}
.empty-emoji{font-size:48px}
.empty-text{font-size:14px;line-height:1.5}
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="pwscreen">
  <div class="pw-logo">AskViet</div>
  <div class="pw-box">
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••" maxlength="20">
    <button class="pw-btn" onclick="checkPw()">Gir</button>
  </div>
  <div class="pw-err" id="pwErr">Hatalı şifre</div>
</div>

<!-- SETUP -->
<div id="setup">
  <div>
    <div class="logo">AskViet</div>
    <div class="logo-sub">TR ⇌ VI çevirmen</div>
  </div>

  <div class="setup-card">
    <div class="setup-label">Model</div>
    <select class="model-select" id="modelSelect">
      <optgroup label="OpenAI">
        <option value="openai:gpt-4o">GPT-4o (En iyi kalite)</option>
        <option value="openai:gpt-4o-mini">GPT-4o-mini (Hızlı &amp; ucuz)</option>
      </optgroup>
      <optgroup label="Google">
        <option value="gemini:gemini-2.5-flash-preview-05-20">Gemini 2.5 Flash</option>
      </optgroup>
    </select>

    <div class="setup-label" id="apiLabel">OpenAI API Key</div>
    <div class="paste-row">
      <input class="setup-input" type="password" id="apiKeyInput" placeholder="sk- veya AI...">
      <button class="paste-btn" onclick="pasteKey()">📋 Yapıştır</button>
    </div>
  </div>

  <div class="role-cards">
    <div class="role-card tr-card" onclick="start('tr')">
      <div class="role-flag">🇹🇷</div>
      <div class="role-name">Türkçe taraf</div>
      <div class="role-desc">Türkçe yaz → karşı taraf Vietnamca görsün</div>
    </div>
    <div class="role-card vi-card" onclick="start('vi')">
      <div class="role-flag">🇻🇳</div>
      <div class="role-name">Tiếng Việt</div>
      <div class="role-desc">Viết tiếng Việt → đối phương xem tiếng Thổ</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="chat-header">
    <div>
      <div class="chat-title" id="chatTitle">AskViet</div>
      <div class="chat-subtitle" id="chatSubtitle">Bağlanıyor...</div>
    </div>
    <div class="header-right">
      <div class="conn-dot off" id="connDot"></div>
      <button class="back-btn" onclick="goBack()">⚙</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-emoji">💬</div>
      <div class="empty-text">Henüz mesaj yok.<br>İlk mesajı gönder!</div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="input-bar">
    <textarea class="msg-input" id="msgInput" rows="1" placeholder="Mesaj yaz..."></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const DB_URL = 'https://askviet-9c4ea-default-rtdb.asia-southeast1.firebasedatabase.app';
const MSGS_PATH = '/messages';
const TYPING_PATH = '/typing';
const PW = 'ask2026';

let myRole = null;
let theirRole = null;
let apiKey = '';
let selectedModel = 'openai:gpt-4o';
let typingTimer = null;
let isTyping = false;
let unsubMessages = null;
let unsubTyping = null;
let renderedKeys = new Set();

// ── Şifre ─────────────────────────────────────────────────────────────────
function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === PW) {
    document.getElementById('pwscreen').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
    loadSaved();
  } else {
    const err = document.getElementById('pwErr');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

// ── Model değişince label güncelle ────────────────────────────────────────
document.getElementById('modelSelect').addEventListener('change', e => {
  const isGemini = e.target.value.startsWith('gemini');
  document.getElementById('apiLabel').textContent = isGemini ? 'Gemini API Key' : 'OpenAI API Key';
  document.getElementById('apiKeyInput').placeholder = isGemini ? 'AIza...' : 'sk-...';
});

// ── Paste ─────────────────────────────────────────────────────────────────
async function pasteKey() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('apiKeyInput').value = text.trim();
  } catch {
    alert('Yapıştırma izni gerekli. Manuel yapıştır.');
  }
}

function loadSaved() {
  const savedKey = localStorage.getItem('askviet_key');
  const savedModel = localStorage.getItem('askviet_model');
  if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
  if (savedModel) {
    document.getElementById('modelSelect').value = savedModel;
    const isGemini = savedModel.startsWith('gemini');
    document.getElementById('apiLabel').textContent = isGemini ? 'Gemini API Key' : 'OpenAI API Key';
  }
}

// ── Firebase REST ──────────────────────────────────────────────────────────
async function fbGet(path) {
  const r = await fetch(DB_URL + path + '.json');
  return r.ok ? r.json() : null;
}
async function fbPush(path, data) {
  const r = await fetch(DB_URL + path + '.json', { method: 'POST', body: JSON.stringify(data) });
  return r.ok ? r.json() : null;
}
async function fbSet(path, data) {
  await fetch(DB_URL + path + '.json', { method: 'PUT', body: JSON.stringify(data) });
}
function fbListen(path, cb) {
  const es = new EventSource(DB_URL + path + '.json');
  es.addEventListener('put', e => { try { cb(JSON.parse(e.data)); } catch {} });
  es.addEventListener('patch', e => { try { cb({ path: '/', data: JSON.parse(e.data) }); } catch {} });
  es.onerror = () => setConnected(false);
  es.onopen = () => setConnected(true);
  return () => es.close();
}

// ── Setup ─────────────────────────────────────────────────────────────────
function start(role) {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert('API key gir!'); return; }
  apiKey = key;
  selectedModel = document.getElementById('modelSelect').value;
  localStorage.setItem('askviet_key', key);
  localStorage.setItem('askviet_model', selectedModel);
  myRole = role;
  theirRole = role === 'tr' ? 'vi' : 'tr';

  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';

  if (role === 'tr') {
    document.getElementById('chatTitle').textContent = '🇹🇷 → 🇻🇳';
    document.getElementById('chatSubtitle').textContent = 'Mesajların Vietnamca çevriliyor';
    document.getElementById('msgInput').placeholder = 'Türkçe yaz...';
  } else {
    document.getElementById('chatTitle').textContent = '🇻🇳 → 🇹🇷';
    document.getElementById('chatSubtitle').textContent = 'Tin nhắn được dịch sang tiếng Thổ';
    document.getElementById('msgInput').placeholder = 'Viết tiếng Việt...';
  }
  initChat();
}

function goBack() {
  if (unsubMessages) unsubMessages();
  if (unsubTyping) unsubTyping();
  renderedKeys.clear();
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('chat').style.display = 'none';
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-emoji">💬</div><div class="empty-text">Henüz mesaj yok.<br>İlk mesajı gönder!</div></div><div class="typing-indicator" id="typingIndicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
}

// ── Chat ──────────────────────────────────────────────────────────────────
function initChat() {
  fbGet(MSGS_PATH).then(data => {
    if (data && typeof data === 'object') {
      Object.entries(data).forEach(([k, v]) => { if (v) renderMessage(k, v); });
      scrollToBottom();
    }
  });

  unsubMessages = fbListen(MSGS_PATH, event => {
    if (!event || !event.data) return;
    const path = event.path || '/';
    if (path === '/') {
      if (typeof event.data === 'object') {
        Object.entries(event.data).forEach(([k, v]) => { if (v) updateOrRender(k, v); });
        scrollToBottom();
      }
    } else {
      const parts = path.replace(/^\//, '').split('/');
      const key = parts[0];
      if (parts.length === 1 && typeof event.data === 'object') {
        updateOrRender(key, event.data);
        scrollToBottom();
      } else if (parts.length === 2 && parts[1] === 'translation' && event.data) {
        const el = document.getElementById('trans-' + key);
        if (el) { el.textContent = event.data; el.style.color = ''; el.style.fontStyle = 'italic'; }
        scrollToBottom();
      }
    }
  });

  unsubTyping = fbListen(TYPING_PATH, event => {
    if (!event) return;
    const path = event.path || '/';
    const ind = document.getElementById('typingIndicator');
    if (!ind) return;
    let val = false;
    if (path === '/') {
      val = !!(event.data && event.data[theirRole]);
    } else if (path === '/' + theirRole) {
      val = !!event.data;
    } else return;
    ind.classList.toggle('show', val);
    if (val) scrollToBottom();
  });
}

function setConnected(v) {
  const dot = document.getElementById('connDot');
  if (dot) dot.classList.toggle('off', !v);
}

function renderMessage(key, msg) {
  if (renderedKeys.has(key)) { updateOrRender(key, msg); return; }
  renderedKeys.add(key);
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const isMine = msg.role === myRole;
  const div = document.createElement('div');
  div.className = 'msg ' + (isMine ? 'mine' : 'theirs');
  div.id = 'msg-' + key;

  const orig = document.createElement('div');
  orig.className = 'msg-original';
  orig.textContent = msg.text;
  div.appendChild(orig);

  const trans = document.createElement('div');
  trans.className = 'msg-translation';
  trans.id = 'trans-' + key;
  if (msg.translation) {
    trans.textContent = msg.translation;
  } else {
    trans.textContent = '⏳ çevriliyor...';
    trans.style.color = 'var(--tr2)';
    trans.style.fontStyle = 'normal';
  }
  div.appendChild(trans);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.ts);
  div.appendChild(time);

  const typing = document.getElementById('typingIndicator');
  document.getElementById('messages').insertBefore(div, typing);
}

function updateOrRender(key, msg) {
  if (!renderedKeys.has(key)) { renderMessage(key, msg); return; }
  const el = document.getElementById('trans-' + key);
  if (el && msg.translation) {
    el.textContent = msg.translation;
    el.style.color = '';
    el.style.fontStyle = 'italic';
  }
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  if (m) setTimeout(() => { m.scrollTop = m.scrollHeight; }, 50);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '';
  document.getElementById('sendBtn').disabled = true;
  setMyTyping(false);

  const msg = { role: myRole, text, ts: Date.now(), translation: null };
  const result = await fbPush(MSGS_PATH, msg);
  const key = result?.name;
  document.getElementById('sendBtn').disabled = false;
  if (!key) return;
  translateAndUpdate(key, text, myRole);
}

async function translateAndUpdate(key, text, fromRole) {
  try {
    const translation = await translateText(text, fromRole);
    await fbSet(MSGS_PATH + '/' + key + '/translation', translation);
  } catch (e) {
    await fbSet(MSGS_PATH + '/' + key + '/translation', '⚠️ Çeviri hatası');
    console.error(e);
  }
}

async function translateText(text, from) {
  const fromName = from === 'tr' ? 'Türkçe' : 'Vietnamca';
  const toName = from === 'tr' ? 'Vietnamca' : 'Türkçe';
  const sysPrompt = `Sen sadece çeviri motorusun. Kaynak dil: ${fromName}. Hedef dil: ${toName}. Türkçe yazan taraf erkektir (Vietnamcada "anh" kullan), Vietnamca yazan taraf kadındır ("em" kullan). Metnin tonunu, üslubunu ve duygusunu birebir yansıt — samimi yazılmışsa samimi, kaba yazılmışsa kaba, küfürlü yazılmışsa küfürlü çevir. Hiçbir şeyi sansürleme veya değiştirme. Sadece çeviriyi döndür, başka hiçbir şey yazma.`;

  const [provider, model] = selectedModel.split(':');

  if (provider === 'gemini') {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: sysPrompt }] },
        contents: [{ parts: [{ text }] }],
        generationConfig: { temperature: 0.2, thinkingConfig: { thinkingBudget: 0 } }
      })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error?.message || r.statusText);
    return (data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim();
  } else {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model,
        temperature: 0.2,
        messages: [
          { role: 'system', content: sysPrompt },
          { role: 'user', content: text }
        ]
      })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error?.message || r.statusText);
    return (data.choices?.[0]?.message?.content || '').trim();
  }
}

// ── Typing ────────────────────────────────────────────────────────────────
function setMyTyping(val) {
  if (isTyping === val) return;
  isTyping = val;
  fbSet(TYPING_PATH + '/' + myRole, val);
}

// ── Input ─────────────────────────────────────────────────────────────────
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  setMyTyping(true);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => setMyTyping(false), 2000);
});

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('beforeunload', () => {
  if (myRole) fbSet(TYPING_PATH + '/' + myRole, false);
});
</script>
</body>
</html>
